<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendNet — Smart Budget Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Animated background -->
  <div class="bg-canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="toggle-icon sun">☀️</span>
    <span class="toggle-icon moon">🌙</span>
  </button>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Main auth container -->
  <main class="auth-main">
    <!-- Brand -->
    <div class="brand-section">
      <div class="brand-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
          <path d="M12 20 C12 14, 28 14, 28 20 C28 26, 12 26, 12 20Z" fill="white" opacity="0.9"/>
          <circle cx="20" cy="20" r="4" fill="url(#logoGrad2)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#6EE7B7"/>
              <stop offset="100%" stop-color="#3B82F6"/>
            </linearGradient>
            <linearGradient id="logoGrad2" x1="0" y1="0" x2="10" y2="10">
              <stop offset="0%" stop-color="#F59E0B"/>
              <stop offset="100%" stop-color="#EF4444"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="brand-name">SpendNet</span>
      </div>
      <p class="brand-tagline">Your money, beautifully managed</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card glass">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Create Account</button>
        <div class="tab-indicator"></div>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" data-form="login">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" autocomplete="email"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" onclick="togglePw(this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
        <p class="auth-switch">No account? <a href="#" class="switch-link" data-switch="register">Create one →</a></p>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" data-form="register">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="regName" class="form-input" placeholder="Your Name" autocomplete="name"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Age</label>
            <div class="input-wrapper">
              <span class="input-icon">🎂</span>
              <input type="number" id="regAge" class="form-input" placeholder="age" min="13" max="120"/>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Gender</label>
            <div class="input-wrapper select-wrapper">
              <span class="input-icon">⚧</span>
              <select id="regGender" class="form-input form-select">
                <option value="">Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="non-binary">Non-binary</option>
                <option value="prefer-not">Prefer not to say</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Country</label>
            <div class="input-wrapper select-wrapper">
              <span class="input-icon">🌍</span>
              <select id="regCountry" class="form-input form-select">
                <option value="">Select country</option>
                <option value="IN">India</option>
                <option value="US">United States</option>
                <option value="UK">United Kingdom</option>
                <option value="CA">Canada</option>
                <option value="AU">Australia</option>
                <option value="DE">Germany</option>
                <option value="FR">France</option>
                <option value="JP">Japan</option>
                <option value="SG">Singapore</option>
                <option value="AE">UAE</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" autocomplete="email"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="regPassword" class="form-input" placeholder="Create strong password" autocomplete="new-password" oninput="checkStrength(this.value)"/>
            <button type="button" class="toggle-pw" onclick="togglePw(this)">👁</button>
          </div>
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
        <p class="auth-switch">Have an account? <a href="#" class="switch-link" data-switch="login">Sign in →</a></p>
      </form>
    </div>

    <!-- Decorative stats -->
    <div class="auth-stats">
      <div class="stat-pill">💰 Track spending</div>
      <div class="stat-pill">📊 Visual charts</div>
      <div class="stat-pill">🎯 Budget goals</div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
